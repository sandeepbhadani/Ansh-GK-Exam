<style>
  :root {
    --sun: #FFD93D;
    --coral: #FF6B6B;
    --mint: #6BCB77;
    --sky: #4D96FF;
    --lavender: #C77DFF;
    --peach: #FFB347;
    --bg: #FFF8F0;
    --card: #ffffff;
    --text: #2d2d2d;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 10% 20%, #FFD93D22 0%, transparent 40%),
                      radial-gradient(circle at 90% 80%, #6BCB7722 0%, transparent 40%),
                      radial-gradient(circle at 50% 50%, #4D96FF11 0%, transparent 60%);
    min-height: 100vh;
    color: var(--text);
  }
  header {
    text-align: center;
    padding: 36px 20px 20px;
    position: relative;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.4rem);
    background: linear-gradient(135deg, var(--coral), var(--lavender), var(--sky));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  header p {
    font-size: 1.1rem;
    color: #777;
    margin-top: 6px;
    font-weight: 600;
  }
  .stars { font-size: 1.4rem; letter-spacing: 4px; margin-top: 4px; }

  /* Paper Tabs */
  .tab-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px 20px;
  }
  .tab-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    padding: 10px 26px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: #fff;
    color: #aaa;
    border: 2.5px solid #ddd;
    transition: all 0.25s;
    box-shadow: 0 2px 8px #0001;
  }
  .tab-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px #0002; }
  .tab-btn.active { color: #fff; border-color: transparent; transform: translateY(-2px); box-shadow: 0 6px 16px #0003; }
  .tab-btn[data-paper="1"].active { background: linear-gradient(135deg, #FF6B6B, #FFB347); }
  .tab-btn[data-paper="2"].active { background: linear-gradient(135deg, #4D96FF, #6BCB77); }
  .tab-btn[data-paper="3"].active { background: linear-gradient(135deg, #C77DFF, #FF6B6B); }
  .tab-btn[data-paper="4"].active { background: linear-gradient(135deg, #FFD93D, #6BCB77); }
  .tab-btn[data-paper="5"].active { background: linear-gradient(135deg, #FF6B6B, #C77DFF); }

  /* Paper Content */
  .paper { display: none; padding: 10px 20px 40px; max-width: 860px; margin: 0 auto; }
  .paper.active { display: block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .paper-header {
    text-align: center;
    margin-bottom: 28px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 4px 20px #0001;
  }
  .paper-header h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
  }
  .paper-header p { color: #888; font-size: 0.95rem; margin-top: 4px; }

  /* Question Cards */
  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 26px;
    margin-bottom: 18px;
    box-shadow: 0 3px 16px #0001;
    border-left: 5px solid transparent;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .question-card:hover { box-shadow: 0 6px 24px #0002; }
  .question-card.answered-correct { border-left-color: var(--mint); background: #f0fff4; }
  .question-card.answered-wrong { border-left-color: var(--coral); background: #fff5f5; }

  .q-num {
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    background: linear-gradient(135deg, var(--sky), var(--lavender));
    color: white;
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 14px;
    color: #333;
  }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 560px) { .options { grid-template-columns: 1fr; } }

  .opt-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-radius: 12px;
    border: 2.5px solid #eee;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.2s;
    background: #fafafa;
    user-select: none;
  }
  .opt-label:hover { border-color: var(--sky); background: #eef5ff; transform: translateX(3px); }
  .opt-label input[type="radio"] { display: none; }
  .opt-label.selected { border-color: var(--sky); background: #ddeeff; }
  .opt-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 0.8rem;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #eee;
    color: #888;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .opt-label.selected .opt-badge { background: var(--sky); color: white; }

  /* Result states after submit */
  .opt-label.show-correct { border-color: var(--mint) !important; background: #e8fff2 !important; }
  .opt-label.show-correct .opt-badge { background: var(--mint) !important; color: white !important; }
  .opt-label.show-wrong { border-color: var(--coral) !important; background: #fff0f0 !important; }
  .opt-label.show-wrong .opt-badge { background: var(--coral) !important; color: white !important; }

  .submit-wrap {
    text-align: center;
    margin-top: 30px;
  }
  .submit-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    padding: 16px 60px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #FF6B6B, #FFB347);
    box-shadow: 0 6px 24px #FF6B6B44;
    transition: all 0.25s;
    letter-spacing: 1px;
  }
  .submit-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px #FF6B6B55; }
  .submit-btn:active { transform: translateY(0) scale(0.98); }
  .submit-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

  /* Score Panel */
  .score-panel {
    display: none;
    text-align: center;
    background: white;
    border-radius: var(--radius);
    padding: 36px 28px;
    margin-top: 28px;
    box-shadow: 0 8px 40px #0002;

  }
  .score-panel.show { display: block; }
  .score-emoji { font-size: 4rem; margin-bottom: 12px; }
  .score-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    margin-bottom: 8px;
  }
  .score-bar-wrap { background: #f0f0f0; border-radius: 50px; height: 20px; overflow: hidden; margin: 16px 0 10px; }
  .score-bar { height: 100%; border-radius: 50px; transition: width 1s ease; }
  .score-detail { font-size: 1rem; color: #888; font-weight: 600; }
  .score-breakdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .score-stat {
    background: #f9f9f9;
    border-radius: 12px;
    padding: 12px 22px;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .score-stat span { font-family: 'Fredoka One', cursive; font-size: 1.5rem; display: block; }
  .retry-btn {
    font-family: 'Fredoka One', cursive;

    padding: 12px 40px;
    border: none;
    border-radius: 50px;
    cursor: pointer;

    box-shadow: 0 4px 16px #4D96FF33;

  }

  footer { text-align: center; padding: 20px; color: #bbb; font-size: 0.85rem; }
</style>
</head>

function showPaper(n) {
  document.querySelectorAll('.paper').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('paper' + n).classList.add('active');
  document.querySelector('[data-paper="' + n + '"]').classList.add('active');
}

function buildPaper(idx) {
  const p = papers[idx];
  const pid = idx + 1;
  const div = document.getElementById('paper' + pid);

  let html = `
    <div class="paper-header">
      <h2 style="background:${p.color};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${p.title}</h2>
      <p>${p.subtitle}</p>
    </div>`;

  p.qs.forEach((q, qi) => {
    const letters = ['A','B','C','D'];
    html += `<div class="question-card" id="p${pid}q${qi}">
      <span class="q-num">Q.${qi+1}</span>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    q.opts.forEach((opt, oi) => {
      html += `<label class="opt-label" id="p${pid}q${qi}o${oi}" onclick="selectOpt(${pid},${qi},${oi})">
        <input type="radio" name="p${pid}q${qi}" value="${oi}">
        <span class="opt-badge">${letters[oi]}</span>
        ${opt}
      </label>`;
    });
    html += `</div></div>`;
  });

  html += `
    <div class="submit-wrap">
      <button class="submit-btn" onclick="submitPaper(${pid})" id="submitBtn${pid}">🎯 Submit Paper ${pid}</button>
    </div>
    <div class="score-panel" id="scorePanel${pid}">
      <div class="score-emoji" id="scoreEmoji${pid}">🎉</div>
      <div class="score-title" id="scoreTitle${pid}">Great Job!</div>
      <div class="score-bar-wrap"><div class="score-bar" id="scoreBar${pid}" style="background:${p.color};width:0%"></div></div>
      <div class="score-detail" id="scoreDetail${pid}"></div>
      <div class="score-breakdown" id="scoreBreakdown${pid}"></div>
      <button class="retry-btn" onclick="resetPaper(${pid})">🔄 Try Again</button>
    </div>`;

  div.innerHTML = html;
}

const selected = {}; // selected[pid][qi] = oi

function selectOpt(pid, qi, oi) {
  if (!selected[pid]) selected[pid] = {};
  if (document.getElementById('submitBtn' + pid).disabled) return;
  selected[pid][qi] = oi;

  const paper = papers[pid - 1];
  for (let o = 0; o < 4; o++) {
    const lbl = document.getElementById(`p${pid}q${qi}o${o}`);
    if (lbl) lbl.classList.toggle('selected', o === oi);
  }
}

function submitPaper(pid) {
  const paper = papers[pid - 1];
  const sel = selected[pid] || {};
  let correct = 0, wrong = 0, unanswered = 0;

  paper.qs.forEach((q, qi) => {
    const card = document.getElementById(`p${pid}q${qi}`);
    const chosenOi = sel[qi];
    if (chosenOi === undefined) {
      unanswered++;
      card.style.borderLeftColor = '#aaa';
    } else if (chosenOi === q.ans) {
      correct++;
      card.classList.add('answered-correct');
    } else {
      wrong++;
      card.classList.add('answered-wrong');
    }
    // Highlight correct & wrong options
    for (let o = 0; o < q.opts.length; o++) {
      const lbl = document.getElementById(`p${pid}q${qi}o${o}`);
      if (!lbl) continue;
      if (o === q.ans) lbl.classList.add('show-correct');
      else if (o === chosenOi && chosenOi !== q.ans) lbl.classList.add('show-wrong');
    }
  });

  document.getElementById('submitBtn' + pid).disabled = true;

  const pct = Math.round((correct / 30) * 100);
  let emoji = '😔', title = 'Keep Practising!';
  if (pct >= 90) { emoji = '🏆'; title = 'Outstanding! You are a Champion!'; }
  else if (pct >= 70) { emoji = '🌟'; title = 'Excellent Work! Well Done!'; }
  else if (pct >= 50) { emoji = '👍'; title = 'Good Try! Keep It Up!'; }
  else if (pct >= 30) { emoji = '📚'; title = 'Keep Studying – You Can Do It!'; }

  document.getElementById('scoreEmoji' + pid).textContent = emoji;
  document.getElementById('scoreTitle' + pid).textContent = title;
  document.getElementById('scoreDetail' + pid).textContent = `You scored ${correct} out of 30 (${pct}%)`;
  document.getElementById('scoreBreakdown' + pid).innerHTML = `
    <div class="score-stat"><span style="color:#6BCB77">${correct}</span>Correct ✅</div>
    <div class="score-stat"><span style="color:#FF6B6B">${wrong}</span>Wrong ❌</div>
    <div class="score-stat"><span style="color:#aaa">${unanswered}</span>Unanswered ⭕</div>
  `;

  const panel = document.getElementById('scorePanel' + pid);
  panel.classList.add('show');
  setTimeout(() => {
    document.getElementById('scoreBar' + pid).style.width = pct + '%';
  }, 100);
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetPaper(pid) {
  if (selected[pid]) delete selected[pid];
  buildPaper(pid - 1);
}

// Build all papers on load
papers.forEach((_, i) => buildPaper(i));
</script>
