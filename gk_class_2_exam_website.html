<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class 2 GK Exam</title>
<style>
body{font-family:Comic Sans MS;background:linear-gradient(to right,#a8edea,#fed6e3);padding:20px;text-align:center}
.container{background:white;padding:20px;border-radius:20px;max-width:900px;margin:auto;box-shadow:0 0 15px rgba(0,0,0,0.2)}
h1{color:#ff4081}
select,input,button{padding:10px;margin:10px;border-radius:10px;border:1px solid #ccc}
button{background:#4caf50;color:white;font-size:16px}
.question{margin:15px 0;text-align:left}
.timer{font-size:20px;color:red;font-weight:bold}
.result{font-size:22px;margin-top:20px;color:#3f51b5}
.review{background:#fff3cd;padding:10px;border-radius:10px;margin-top:15px;text-align:left}
</style>
</head>
<body>
<div class="container">
<h1>🌟 GK Quiz Class 2 🌟</h1>

<input id="studentName" placeholder="Enter Student Name">
<br>
<select id="paperSelect" onchange="loadPaper()">
<option value="0">Select Paper</option>
<option value="1">Paper 1</option>
<option value="2">Paper 2</option>
<option value="3">Paper 3</option>
<option value="4">Paper 4</option>
<option value="5">Paper 5</option>
</select>

<div class="timer" id="timer"></div>
<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="window.print()">Print Report</button>

<div class="result" id="result"></div>
<div id="review"></div>
</div>

<script>
const papers={};

function makeQ(q,a,b,c,d,ans){return{q:q,opts:[a,b,c,d],ans:ans}}

papers[1]=[
makeQ("Which organ helps us see?","Eye","Ear","Nose","Hand",0),
makeQ("CPU is called?","Brain of computer","Mouse","Screen","Wire",0),
makeQ("Badminton uses?","Racket","Bat","Stick","Club",0),
makeQ("Doctor treats?","Cars","Plants","Sick people","Shoes",2),
makeQ("Air is a?","Want","Need","Toy","Game",1),
makeQ("Farmer grows?","Food","Cars","Rings","Chairs",0),
makeQ("Mouse moves?","Cursor","Printer","CPU","Wire",0),
makeQ("Ice skating place?","Rink","Pitch","Track","Court",0),
makeQ("Printer prints on?","Paper","Glass","Cloth","Wood",0),
makeQ("Planting trees gives?","Clean air","Smoke","Dust","Heat",0),
makeQ("House is?","Need","Want","Toy","Game",0),
makeQ("Monitor shows?","Text & pictures","Smell","Taste","Touch",0),
makeQ("Keyboard used to?","Type","Cut","Wash","Throw",0),
makeQ("Policeman keeps?","Safety","Rain","Music","Books",0),
makeQ("Nurse helps?","Patients","Cars","Fans","Trees",0),
makeQ("Track is for?","Running","Eating","Sleeping","Drawing",0),
makeQ("Speaker gives?","Sound","Water","Light","Paper",0),
makeQ("Christmas tree is?","Want","Need","Food","Water",0),
makeQ("Bracelet is?","Want","Need","Food","Air",0),
makeQ("Pitch used for?","Cricket","Chess","Ludo","Carrom",0),
makeQ("Respect means?","Be polite","Fight","Cry","Run",0),
makeQ("Sweater worn in?","Winter","Summer","Rain","Spring",0),
makeQ("Flute player?","Hariprasad","Sachin","Dhoni","Kohli",0),
makeQ("Simile uses words?","Like/as","But","And","So",0),
makeQ("Course used for?","Golf","Tennis","Cricket","Hockey",0),
makeQ("Computer part typing?","Keyboard","Mouse","Speaker","Printer",0),
makeQ("Bad habit?","Scribbling walls","Helping","Sharing","Respect",0),
makeQ("Food is?","Need","Want","Toy","Game",0),
makeQ("Doctor Day in India?","July 1","Jan 1","Aug 15","Oct 2",0),
makeQ("Racket sport?","Badminton","Football","Hockey","Golf",0)
];

function clone(arr){return JSON.parse(JSON.stringify(arr))}
papers[2]=clone(papers[1]).map((x,i)=>({...x,q:x.q+" ?"}))
papers[3]=clone(papers[1]).map((x,i)=>({...x,q:"Q"+(i+1)+". "+x.q}))
papers[4]=clone(papers[1]).map((x,i)=>({...x,q:x.q.replace("?","")}))
papers[5]=clone(papers[1]).map((x,i)=>({...x,q:"Choose: "+x.q}))

let timeLeft=0, timerInt;

function loadPaper(){
const p=document.getElementById("paperSelect").value;
const form=document.getElementById("quiz");
form.innerHTML="";
if(p==0)return;

papers[p].forEach((q,i)=>{
form.innerHTML+=`<div class='question'><b>${i+1}. ${q.q}</b><br>`+
q.opts.map((o,j)=>`<label><input type='radio' name='q${i}' value='${j}'> ${o}</label><br>`).join("")+
"</div>";
});

startTimer(600);
}

function startTimer(sec){
clearInterval(timerInt);
timeLeft=sec;
timerInt=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerHTML=`⏳ Time Left: ${m}:${s<10?"0"+s:s}`;
if(timeLeft--<=0){clearInterval(timerInt);submitQuiz();}
},1000);
}

function submitQuiz(){
clearInterval(timerInt);
let p=document.getElementById("paperSelect").value;
let score=0;
let review="";

papers[p].forEach((q,i)=>{
let sel=document.querySelector(`input[name=q${i}]:checked`);
let val=sel?Number(sel.value):-1;
if(val===q.ans)score++;
review+=`<div class='review'>Q${i+1}: ${q.q}<br>Your: ${q.opts[val]||"Not Answered"}<br>Correct: ${q.opts[q.ans]}</div>`;
});

let name=document.getElementById("studentName").value||"Student";

document.getElementById("result").innerHTML=`🎉 ${name}, Your Score: ${score}/30`;
document.getElementById("review").innerHTML=review;
}
</script>
</body>
</html>
